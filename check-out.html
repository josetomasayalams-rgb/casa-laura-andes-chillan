<body class="is-winter bg-checkout" data-section="checkout">
 <div class="app-container">

  <header class="header">

   <h2 style="margin:0" data-i18n="nav.checkout.t">Check-out</h2>

  <div class="lang-selector" role="group" data-i18n-aria="lang.selector" aria-label="Idioma">

  <!-- Departure deadline — default time, tabular-nums. TODO(host): confirmar hora real. -->

   <p style="color:var(--forest)" data-i18n="checkout.farewell">[cargado vía i18n]</p>
  </div>

 </div>
