<!DOCTYPE html>
<!-- Manual de la estadía: credenciales públicas, calefacción y reglas. -->
<html lang="es" data-i18n-title="page.manual.title">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <script>document.documentElement.classList.add('access-pending');</script>
 <style>html.access-pending body{visibility:hidden}</style>
 <title>Manual · CordalSur</title>
 <link rel="preload" as="image" type="image/webp" media="(min-width: 720px)" fetchpriority="high" href="css/bg/winter/instrucciones-termas-nieve.webp?v=2">
 <script>(function(){var t="";try{t=localStorage.getItem("gh-theme-v3")||""}catch(e){}if(t!=="light"&&t!=="dark"){t="dark"}document.documentElement.setAttribute("data-theme",t)})();</script>
  <script>(function(){var c=new URLSearchParams(location.search).get("condition");if(c==="a"||c==="b")document.documentElement.setAttribute("data-study-condition",c)})();</script>
<link rel="stylesheet" href="css/styles.css?v=20">
 <link rel="stylesheet" href="css/section-palettes.css?v=4">
 <link rel="stylesheet" href="css/access.css?v=4">
</head>
<body class="is-winter bg-instrucciones" data-section="manual">
 <div class="app-container">

  <header class="header">
   <a href="index.html" class="btn-back" data-i18n-aria="common.back" aria-label="Volver">←</a>
   <h2 style="margin:0" data-i18n="nav.info.t">Manual</h2>
  </header>
  <div class="lang-selector" role="group" data-i18n-aria="lang.selector" aria-label="Idioma">
   <button type="button" data-lang="es" aria-pressed="true">ES</button>
   <button type="button" data-lang="pt" aria-pressed="false">PT</button>
   <button type="button" data-lang="en" aria-pressed="false">EN</button>
  </div>

  <section class="wifi-card" id="wifi" data-i18n-aria="wifi.card.aria" aria-label="Wi-Fi del alojamiento">
   <div class="wifi-card__heading">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/></svg>
    <div>
     <h3 data-i18n="wifi.card.title">Wi-Fi</h3>
     <p data-i18n="wifi.card.description">Conéctate durante tu estadía.</p>
    </div>
   </div>
   <div class="wifi-card__credential">
    <div class="wifi-card__value">
     <span class="wifi-card__label" data-i18n="wifi.password.label">Contraseña</span>
     <strong class="wifi-card__password" data-wifi-password data-i18n="wifi.password.value">Mateo123</strong>
    </div>
    <button class="wifi-copy" type="button" data-wifi-copy>
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M15 9V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h3"/></svg>
     <span data-wifi-copy-label data-i18n="wifi.copy">Copiar</span>
    </button>
   </div>
   <p class="wifi-card__status" data-wifi-status role="status" aria-live="polite"></p>
  </section>

  <!-- FAQ accordion — calefacción y normas. Native <details>. -->
  <h3 class="section-title" data-i18n="info.faq.t">Preguntas frecuentes</h3>
  <div class="accordion mb-4">
   <details>
    <summary data-i18n="info.q2">[cargado vía i18n]</summary>
    <div class="body" data-i18n="info.a2">[cargado vía i18n]</div>
   </details>
   <details>
    <summary data-i18n="info.q3">[cargado vía i18n]</summary>
    <div class="body" data-i18n="info.a3">[cargado vía i18n]</div>
   </details>
  </div>

  <!-- Emergency card — real generic sub-copy; action phone is TODO(host) -->
  <div class="emergency-card">
   <div class="card-header">
    <div class="icon-box bg-copper">⚠️</div>
    <div>
     <h3 data-i18n="emergency.title">Emergencias</h3>
     <p style="margin:0;font-size:0.9rem" data-i18n="emergency.sub">[cargado vía i18n]</p>
    </div>
   </div>
   <a href="tel:133" class="btn" data-i18n="emergency.action" style="margin-top:12px;">[cargado vía i18n]</a>
  </div>

 </div>
<script src="js/lang.js?v=10"></script>
 <script src="js/access.js?v=4" data-api-base="https://cordal-sur-access.josetomasayalams.workers.dev"></script>
 <script src="js/manual.js?v=1"></script>
<script src="js/theme.js?v=7"></script>
 <script src="js/study-condition.js?v=1"></script>
</body>
</html>
